.build-cta-image:
  stage: build:image
  needs:
    - job: build-cta-rpms
      optional: true # We don't need this in every pipeline type
    - job: modify-project-json
      optional: true
  rules:
    - if: $PIPELINE_TYPE == "REGR_AGAINST_CTA_VERSION"
      when: never
    - when: on_success
  image:
    name: $IMAGE_DOCKER_IMAGE_BUILDER
    entrypoint: [""]
  variables:
    CONTAINER_STORAGE: "/builds/container-storage"
    METRICS_FILE: "${CI_PROJECT_DIR}/metrics.txt"
    TARGET_NAME: # Should be overwritten by one of the child jobs
    CTA_BUILD_ID: ${CI_PIPELINE_ID}git${CI_COMMIT_SHORT_SHA}
    GIT_SUBMODULE_STRATEGY: "none" # Don't need submodules for these jobs
    DOCKERFILE: ci/docker/cta/${PLATFORM}/prod.Dockerfile
    IMAGE_NAME: ctageneric/${TARGET_NAME} # ctageneric is important because that's the private repo.
    IMAGE_REF: ${CI_REGISTRY}/cta/${IMAGE_NAME}:${CTA_BUILD_ID}
    # Important that this matches the artifact path from the build job
    RPM_CONTEXT: ${CI_PROJECT_DIR}/build_rpm/RPM/RPMS/x86_64
    EXTRA_BUILD_ARGS: ""
  before_script:
    # We have an explicit whitelist of registries here.
    # That is to ensure we don't accidentally push an image containing Oracle RPMs to a public registry
    - |
      case "$IMAGE_REF" in
          gitlab-registry.cern.ch/cta/ctageneric/*) ;;
          *)
              echo "Refusing to push image to non-whitelisted registry: $IMAGE_REF"
              exit 1
              ;;
      esac
    # Configure storage. See https://gitlab.cern.ch/gitlabci-examples/build_docker_image/-/blob/fce98393aab8f3ffca3b8449036ccb02275c8a46/.gitlab-ci.yml#L19
    - mkdir -p ${CONTAINER_STORAGE}
    - mkdir -p ~/.config/containers/
    - |
      cat > ~/.config/containers/storage.conf << EOF
      [storage]
       driver = "overlay"
       runroot = "${CONTAINER_STORAGE}/run/containers/storage"
       graphroot = "${CONTAINER_STORAGE}/.local/share/containers/storage"
       rootless_storage_path = "${CONTAINER_STORAGE}/.local/share/containers/storage"
       [storage.options]
       pull_options = {enable_partial_images = "true", use_hard_links = "false", ostree_repos=""}
       [storage.options.overlay]
      EOF
    - cp ~/.config/containers/storage.conf /etc/containers/storage.conf || true
    - echo "$DOCKER_LOGIN_PASSWORD" | buildah login -u "$DOCKER_LOGIN_USERNAME" --password-stdin $CI_REGISTRY
  script:
    - echo "Building target ${TARGET_NAME}"
    - cd "$(dirname "${DOCKERFILE}")"
    - DOCKERFILE_NAME="$(basename "${DOCKERFILE}")"
    - (( USE_ORACLE_CATALOGUE = ORACLE_SUPPORT == "TRUE" ))
    - (( USE_INTERNAL_REPOS_01 = USE_INTERNAL_REPOS == "TRUE" ))
    - BUILDAH_ARGS=(
        --target "${TARGET_NAME}"
        --file "${DOCKERFILE_NAME}"
        --tag "${IMAGE_REF}"
        --build-context rpm_context="${RPM_CONTEXT}"
        --build-arg USE_INTERNAL_REPOS="${USE_INTERNAL_REPOS_01}"
        --build-arg USE_ORACLE_CATALOGUE="${USE_ORACLE_CATALOGUE}"
      )
    - if [ -n "$EXTRA_BUILD_ARGS" ]; then BUILDAH_ARGS+=($EXTRA_BUILD_ARGS); fi
    - buildah bud "${BUILDAH_ARGS[@]}" .
    - echo "Pushing to ${IMAGE_REF}"
    - buildah push "${IMAGE_REF}"
    - echo $(buildah images --filter reference="$IMAGE_REF" --format '{{.Size}}')
    - echo "docker_image_size_${TARGET_NAME//-/_} $(( $(buildah images --filter reference="$IMAGE_REF" --format '{{.Size}}') / 1024 / 1024 ))" >> "$METRICS_FILE"
  artifacts:
    when: always
    expire_in: 30 days
    reports:
      metrics: $METRICS_FILE

###############################################
# Image Targets
###############################################

build-image-taped:
  extends:
    - .build-cta-image
  variables:
    TARGET_NAME: "cta-taped"

build-image-rmcd:
  extends:
    - .build-cta-image
  variables:
    TARGET_NAME: "cta-rmcd"

build-image-maintd:
  extends:
    - .build-cta-image
  variables:
    TARGET_NAME: "cta-maintd"

build-image-frontend:
  extends:
    - .build-cta-image
  variables:
    TARGET_NAME: "cta-frontend"

build-image-tools:
  extends:
    - .build-cta-image
  variables:
    TARGET_NAME: "cta-tools"

