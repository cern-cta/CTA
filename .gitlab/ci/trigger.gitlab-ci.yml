.trigger-child-pipeline:
  allow_failure: true
  stage: trigger
  needs: []
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $PIPELINE_TYPE != "DEFAULT"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "push"
      when: manual
  trigger:
    include: .gitlab-ci.yml
    strategy: mirror
  inherit:
    variables: false

trigger-grpc-frontend-pipeline:
  extends:
    - .trigger-child-pipeline
  variables:
    DEFAULT_CTA_VALUES_FILE: "presets/dev-cta-grpc-values.yaml"
    DEFAULT_EOS_VALUES_FILE: "presets/dev-eos-grpc-values.yaml"

trigger-postgres-scheduler-pipeline:
  extends:
    - .trigger-child-pipeline
  variables:
    SCHEDULER_TYPE: "pgsched"

trigger-oracle-disabled-pipeline:
  extends:
    - .trigger-child-pipeline
  variables:
    ORACLE_SUPPORT: "FALSE"

trigger-sonarcloud-pipeline:
  allow_failure: true
  stage: trigger
  needs: []  # Ensure no artifacts are downloaded
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
  image: $IMAGE_LINT
  variables:
    GIT_STRATEGY: "none" # Don't need anything from the repo for this job
    TARGET_URL: https://api.github.com/repos/cern-cta/CTA/actions/workflows/sonar-source.yml/dispatches
    BRANCH_NAME: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
  script:
    - |
      curl -X POST \
        -H "Accept: application/vnd.github+json" \
        -H "Authorization: Bearer $GITHUB_API_TOKEN" \
        $TARGET_URL \
        -d "{\"ref\":\"${BRANCH_NAME}\"}"
    - echo "Please visit https://github.com/cern-cta/CTA/actions to see the progress of the analysis"
