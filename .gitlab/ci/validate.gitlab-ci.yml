validate-catalogue-schema-version:
  stage: validate
  needs: []  # Ensure no artifacts are downloaded
  rules:
    - if: $PIPELINE_TYPE != "DEFAULT"
      when: never
    # For pivot CTA releases: vX.Y.0
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^.*\.0\.[0-9]+-[^-]*$/
      when: on_success
      variables:
        CATALOGUE_SCHEMA_CHECK_PARAMS: "-p -t"
    # For non-pivot CTA releases
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG !~ /^.*\.0\.[0-9]+-[^-]*$/
      when: on_success
      variables:
        CATALOGUE_SCHEMA_CHECK_PARAMS: "-n -t"
    # Any run on main
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
      variables:
        CATALOGUE_SCHEMA_CHECK_PARAMS: "-t"
    # For all other scenarios, manual run only
    - when: on_success
      variables:
        CATALOGUE_SCHEMA_CHECK_PARAMS: ""
  script:
    - ./ci/checks/check_catalogue_schema_version.sh ${CATALOGUE_SCHEMA_CHECK_PARAMS} .

validate-pipeline-variables:
  stage: validate
  needs:
    - job: modify-project-json
      optional: true
  rules:
    - when: on_success
  variables:
    GIT_SUBMODULE_STRATEGY: "none" # Don't need submodules for this job
  script:
    - cp -f ci/docker/${PLATFORM}/etc/yum.repos.d-public/*.repo /etc/yum.repos.d/
    - |
      if [[ "$USE_INTERNAL_REPOS" == "TRUE" ]]; then
        cp -f ci/docker/${PLATFORM}/etc/yum.repos.d-internal/*.repo /etc/yum.repos.d/
      fi
    # This repo is a special case as it provides CTA itself
    - cp -f ci/docker/${PLATFORM}/cta-public-testing.repo /etc/yum.repos.d/
    - python3 ./ci/checks/validate_ci_input_variables.py

validate-project-json:
  stage: validate
  needs:
    - job: modify-project-json
      optional: true
  rules:
    - when: on_success
  script:
    - python3 ./ci/project-json/validate_project_json.py
