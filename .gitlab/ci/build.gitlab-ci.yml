build-cta-rpms:
  stage: build
  needs:
    - job: modify-project-json
      optional: true
  rules:
    - if: $PIPELINE_TYPE == "SYSTEM_TEST_ONLY"
      when: never
    - if: $PIPELINE_TYPE == "REGR_AGAINST_CTA_VERSION"
      when: never
    - if: $PIPELINE_TYPE == "IMAGE_FROM_CTA_VERSION"
      when: never
    # These rules serve to prevent the rest of the pipeline from triggering when only trivial files such as the CHANGELOG have been modified
    # GitLab only allows a whitelist and not a blacklist, so we have to list all file changes that should trigger the build job
    - changes:
        - .dockerignore
        - .gitlab-ci.yml
        - CMakeLists.txt
        - cta.spec.in
        - project.json
        - version.hpp.in
        - xrootd-ssi-protobuf-interface
        # To be safe, all files in all sub-directories
        # Once we have a src/ directory, we can be a bit more specific without having to specify a long list here
        - '*/**/*'
      variables:
        CACHE_BRANCH: '$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME'
      when: on_success
    # If only "trivial" changes were done and we are in a MR, set this job to manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true  # Ensures the pipeline counts as "passed" instead of "blocked"
      variables:
        CACHE_BRANCH: '$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME'
    # Ensure we cover any other cases that might trigger this
    - when: on_success
      variables:
        CACHE_BRANCH: '$CI_COMMIT_BRANCH'
  image: $IMAGE_BUILD
  variables:
    CTA_BUILD_ID: ${CI_PIPELINE_ID}git${CI_COMMIT_SHORT_SHA}
    BUILD_PATH: "build_rpm/RPM/RPMS"
    XRD_SSI_PATH: "xrootd-ssi-protobuf-interface"
    RPM_SIZE_METRICS_ID: "relwithdebinfo" # Default build is a debug build
    DNF_CACHE_DIR: "$CI_PROJECT_DIR/.dnf_cache"
    # Will only be used if ccache is enabled
    CCACHE_BASEDIR: "/builds/cta"
    CCACHE_NOHASHDIR: "true"
    CCACHE_DIR: "$CI_PROJECT_DIR/.ccache"
    CCACHE_COMPRESS: "true"
    CCACHE_MAXSIZE: "2G"
    # Necessary to ensure builds in different jobs don't cause all kinds of cache misses
    CXXFLAGS: "-fdebug-prefix-map=/builds/cta=. -ffile-prefix-map=/builds/cta=."
    # Faster GitLab cache performance
    FF_USE_FASTZIP: "true"
    ARTIFACT_COMPRESSION_LEVEL: "fastest"
    CACHE_COMPRESSION_LEVEL: "fastest"
  before_script:
    - |
      if [[ -z "${CI_COMMIT_TAG}" ]]; then
        export CTA_VERSION=$BUILD_CTA_VERSION
        export VCS_VERSION=$CTA_BUILD_ID
      else
        export CTA_VERSION=$(echo ${CI_COMMIT_TAG} | awk -F '[v-]' '{print $2}')
        export VCS_VERSION=$(echo ${CI_COMMIT_TAG} | awk -F '-' '{if(NF>1) print $2; else print 0}')
      fi
    - echo "Building package CTA_VERSION=${CTA_VERSION} - CTA_RELEASE=${VCS_VERSION}"
    - git -C "$XRD_SSI_PATH" fetch --tags
    - export XRD_SSI_VERSION=$(git --git-dir=$XRD_SSI_PATH/.git --work-tree=$XRD_SSI_PATH describe --tags --abbrev=0)
    - |
      if [[ -z "$XRD_SSI_VERSION" ]]; then
        echo "Error: failed to find tag for submodule $XRD_SSI_PATH"
        exit 1
      fi
    - ccache --zero-stats
    - echo "CCache enabled ${ENABLE_CCACHE}"
    - echo "CCache policy ${BUILD_CACHE_POLICY}"
  script:
    # SRPMS
    - ./ci/build/build_srpm.sh --build-dir build_srpm
                               --build-generator "${BUILD_GENERATOR}"
                               --create-build-dir
                               --cta-version ${BUILD_CTA_VERSION}
                               --vcs-version ${VCS_VERSION}
                               --scheduler-type ${SCHEDULER_TYPE}
                               --oracle-support ${ORACLE_SUPPORT}
                               --cmake-build-type "${CMAKE_BUILD_TYPE}"
                               --jobs $(nproc --ignore=1)
    # RPMS
    - BUILD_OPTIONS=""
    - if [[ "$ENABLE_CCACHE" == "TRUE" ]]; then BUILD_OPTIONS+=" --enable-ccache"; fi
    - if [[ "$ENABLE_DEBUG_INFO" == "FALSE" ]]; then BUILD_OPTIONS+=" --skip-debug-packages"; fi
    - if [[ "$USE_INTERNAL_REPOS" == "TRUE" ]]; then BUILD_OPTIONS+=" --use-internal-repos"; fi
    - if [[ "$ENABLE_ADDRESS_SANITIZER" == "TRUE" ]]; then BUILD_OPTIONS+=" --enable-address-sanitizer"; fi
    - ./ci/build/build_rpm.sh --build-dir build_rpm
                              --build-generator "${BUILD_GENERATOR}"
                              --create-build-dir
                              --srpm-dir build_srpm/RPM/SRPMS
                              --cta-version ${CTA_VERSION}
                              --vcs-version ${VCS_VERSION}
                              --xrootd-ssi-version ${XRD_SSI_VERSION}
                              --scheduler-type ${SCHEDULER_TYPE}
                              --oracle-support ${ORACLE_SUPPORT}
                              --cmake-build-type "${CMAKE_BUILD_TYPE}"
                              --jobs $(nproc --ignore=1)
                              --install-srpms
                              --platform ${PLATFORM}
                              --skip-unit-tests
                              ${BUILD_OPTIONS}
    - echo "rpm_${RPM_SIZE_METRICS_ID}_packages_total_kb $(find ${BUILD_PATH} -type f -name '*.rpm' -printf '%s\n' | awk '{s+=$1} END {printf "%.0f\n", s/1000}' | cut -f1)" > metrics.txt
  after_script:
    - if [[ "$ENABLE_CCACHE" == "TRUE" ]]; then ccache --show-stats --verbose; fi
  artifacts:
    expire_in: 30 days
    paths:
      - ${BUILD_PATH}
    reports:
      metrics: metrics.txt

  cache:
    - key: "build-cache:${CI_PROJECT_ID}:${CACHE_BRANCH}"
      fallback_keys:
        - "build-cache:${CI_PROJECT_ID}:${CI_DEFAULT_BRANCH}"
      policy: $BUILD_CACHE_POLICY
      paths:
        - .ccache/
        - .dnf_cache/


# Specifically to build CTA without ccache and with debug packages enabled
build-cta-rpms-no-cache:
  extends:
    - build-cta-rpms
  rules:
    - if: $CI_PIPELINE_SOURCE != "merge_request_event"
      when: never
    - !reference [.build-image, rules]
  variables:
    ENABLE_CCACHE: "FALSE"
    ENABLE_DEBUG_INFO: "FALSE"
    RPM_SIZE_METRICS_ID: "relwithdebinfo_no_cache"
  cache: [] # Explicitly disable the cache


# These are not (and ideally should not) be used further down the pipeline; just a compilation checks
build-cta-rpms-pgsched:
  extends:
    - build-cta-rpms
  variables:
    # We don't have a way of separating what the user entered and what the actual value is,
    # so this will always run, even if the pipeline type was already postgres
    SCHEDULER_TYPE: "pgsched"
    SKIP_UNIT_TESTS: "TRUE"
    ENABLE_CCACHE: "FALSE"
    RPM_SIZE_METRICS_ID: "relwithdebinfo_pgsched_no_cache"
  cache: [] # Explicitly disable the cache

build-cta-rpms-debug:
  extends:
    - build-cta-rpms
  variables:
    CMAKE_BUILD_TYPE: "Debug"
    RPM_SIZE_METRICS_ID: "debug_no_cache"
    ENABLE_CCACHE: "FALSE"
  cache: [] # Explicitly disable the cache

reset-ccache:
  allow_failure: true
  stage: build
  needs: []
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - when: never
  image: $IMAGE_BUILD
  variables:
    GIT_STRATEGY: none  # We don't need the repo clone here
    BUILD_CACHE_POLICY: push
  script:
    - rm -rf .ccache
    - mkdir -p .ccache
    # upload an empty cache
    - touch .ccache/.keep
  cache:
    - !reference [build-cta-rpms, cache]

# Documentation export
export-docs:
  stage: build
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - echo "Exporting man pages (Markdown)"
    - mkdir docs
    - /usr/bin/find . -path ./docs -prune -o -name '*cta.md' -exec cp {} docs/ \;
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - docs/
