apiVersion: v1
kind: ConfigMap
metadata:
  name: krb5-conf-client
  namespace: {{ .Release.Namespace }}
data:
  krb5.conf: |
    [libdefaults]
      default_realm = {{ .Values.realm }}
      dns_lookup_realm = true
      dns_lookup_kdc = true
      ticket_lifetime = 24h
      renew_lifetime = 7d
      forwardable = true
      dns_canonicalize_hostname = false

    [realms]
      {{ .Values.realm }} = {
        kdc = kdc
        admin_server = kdc
      }
