apiVersion: v1
kind: ConfigMap
metadata:
  name: krb5-conf-server
  namespace: {{ .Release.Namespace }}
data:
  krb5.conf: |
    [libdefaults]
      default_realm = {{ .Values.realm }}
      dns_lookup_realm = true
      dns_lookup_kdc = true
      ticket_lifetime = 24h
      renew_lifetime = 7d
      forwardable = true
      dns_canonicalize_hostname = false

    [realms]
      {{ .Values.realm }} = {
        kdc = kdc
        admin_server = kdc
      }

    [logging]
      default = FILE:/var/log/krb5lib.log
      kdc = FILE:/var/log/kdc.log
      admin_server = FILE:/var/log/kadmind.log

