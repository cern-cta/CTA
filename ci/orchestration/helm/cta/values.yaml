# These settings are available to all the subcharts
global:
  image:
    repository: gitlab-registry.cern.ch/cta/ctageneric
    tag: ""
    pullPolicy: IfNotPresent
    pullSecrets:
      - reg-ctageneric

  catalogue:
    secretName: cta-catalogue-conf
    secretKey: cta-catalogue.conf

  scheduler:
    secretName: cta-scheduler-conf
    secretKey: cta-scheduler.conf

  # Can be removed once the objectstore is removed
  objectstore:
    enabled: false
    backend: "" # Options: vfs, ceph
    # Only used if the backend is ceph
    ceph:
      mon: ""
      monport: ""
      pool: ""
      namespace: ""
      id: ""
      key: ""

  #
  # Define extra arbitrary Kubernetes objects (secrets, configmaps, static PVs, etc.) as items in a list.
  #   Example:
  #   extraObjects:
  #     - |
  #       apiVersion: v1
  #       kind: ConfigMap
  #       metadata:
  #         name: {{ .Release.Name }}-extra
  #       data:
  #         speed: fast
  extraObjects: []

  # Must match the authentication chart
  kerberos:
    clientConfig:
      configMap: krb5-conf
    defaultRealm: TEST.CTA
    adminPrinc:
      name: root
      password: "defaultcipassword"

  extraVolumes:
    volumes:
      - name: coredumps
        emptyDir: {}
    volumeMounts:
      - name: coredumps
        mountPath: /var/log/tmp


  securityContext:
    allowPrivilegeEscalation: False
    privileged: False
