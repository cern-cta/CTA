{{- $schedulerConfig := include "scheduler.config" . | fromYaml -}}
{{- $name := include "ctafrontend.fullname" . }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: cta-frontend-admin-conf
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
data:
  cta-frontend.conf: |-
    #
    # CTA options
    #

    cta.instance_name {{ .Release.Namespace }}

    cta.operation_mode admin_all

    cta.schedulerdb.scheduler_backend_name {{ $schedulerConfig.backend }}

    # CTA ObjectStore options
    cta.objectstore.backendpath {{ include "global.schedulerUrl" . }}

    # CTA Scheduler DB options
    cta.schedulerdb.numberofthreads {{ .Values.conf.schedulerdb.numberOfThreads }}
    cta.schedulerdb.threadstacksize_mb {{ .Values.conf.schedulerdb.threadStackSizeMb }}

    # CTA Scheduler DB options - Cache timeout options (decreased for tests)
    cta.schedulerdb.tape_cache_max_age_secs {{ .Values.conf.schedulerdb.tapeCacheMaxAgeSecs }}
    cta.schedulerdb.retrieve_queue_cache_max_age_secs {{ .Values.conf.schedulerdb.retrieveQueueCacheMaxAgeSecs }}

    # CTA Scheduler DB - number of connection in the pool
    cta.schedulerdb.numberofconnections {{ .Values.conf.schedulerdb.numberOfConnections }}

    # CTA Catalogue options
    cta.catalogue.numberofconnections {{ .Values.conf.catalogue.numberOfConnections }}

    # Missing tape file copies minimum age.
    # Set it to prevent false flagging of multi-copy files in the process of being archived tapes.
    # Default 24 hours
    cta.catalogue.missing_file_copies_min_age_secs {{ .Values.conf.catalogue.missingFileCopiesMinAgeSecs }}

    # Maximum file size (in GB) that the CTA Frontend will accept for archiving
    cta.archivefile.max_size_gb {{ .Values.conf.frontend.archiveFileMaxSizeGb }}

    # Disallow 0-length files
    cta.archivefile.zero_length_files_forbidden {{ .Values.conf.frontend.zeroLengthFilesForbidden }}

    # Tapepools exempted from this check (if enabled)
    cta.archivefile.zero_length_files_forbidden_vo_exception_list {{ .Values.conf.frontend.zeroLengthFilesForbiddenVoExceptionList }}

    # CTA Frontend log URL
    cta.log.url file:/var/log/cta/cta-frontend.log

    # CTA Logger log level
    # Valid log levels are EMERG, ALERT, CRIT, ERR, WARNING, NOTICE (==USERERR), INFO, DEBUG
    cta.log.level {{ .Values.conf.logger.logLevel }}

    # CTA Logger log format
    # Valid formats are default, json
    cta.log.format {{ .Values.conf.logger.logFormat }}

    cta.log.log_header true

    # CTA Repack buffer URL
    # cta.repack.repack_buffer_url {{ .Values.conf.frontend.repackBufferUrl }}

    # CTA Verification Mount Policy
    cta.verification.mount_policy verification

    {{- if .Values.legacy_xrootd_mode }}
    #
    # XRootD/SSI options
    #

    # Load the CTA SSI plugin
    xrootd.fslib -2 libXrdSsi.so

    # Load the SSI module
    ssi.svclib libXrdSsiCta.so

    # Use the security module
    xrootd.seclib libXrdSec.so

    # Security protocol specification
    #
    # Note: the XRootD process needs to be able to read the keytab file
    sec.protocol krb5 /etc/cta/cta-frontend.krb5.keytab cta/{{ $name }}@{{ .Values.global.kerberos.defaultRealm }}
    sec.protocol sss -s /etc/cta/diskbuffer.sss.keytab

    # Only Kerberos 5 and sss are allowed
    sec.protbind * only sss krb5

    # Turn off asynchronous I/O
    xrootd.async off

    # Use a port other than 1094, already in use
    xrd.port {{ .Values.port }}

    # Export the SSI resource
    all.export /ctafrontend nolock r/w

    # CTA XRootD SSI Protobuf log level
    cta.log.ssi {{ .Values.conf.logger.ssiLogLevel }}

    {{- else}}
    #
    # gRPC options
    #
    grpc.port {{ .Values.port }}
    grpc.numberofthreads {{ .Values.conf.numberOfThreads }}

    # Auth methods allowed
    grpc.admin.auth_methods {{ join " " .Values.conf.auth.methods }}

    # TLS related variables
    grpc.tls.enabled {{ .Values.conf.tls.enabled }}
    grpc.tls.server_key_path {{ .Values.conf.tls.serverKey }}
    grpc.tls.server_cert_path {{ .Values.conf.tls.serverCert }}
    grpc.jwks.uri file:///etc/cta/jwks.json
    {{- if .Values.conf.tls.caCert }}
    grpc.tls.chain_cert_path {{ .Values.conf.tls.caCert }}
    {{- end }}

    {{- if has "kerberos" .Values.conf.auth.methods }}
    # Kerberos authentication
    grpc.keytab {{ .Values.conf.auth.config.kerberos.keytab }}
    grpc.service_principal {{ .Values.conf.auth.config.kerberos.service_principal }}
    {{- end }}
    {{- end }}

    # Telemetry
    cta.experimental.telemetry.enabled {{ .Values.conf.telemetry.enabled }}

    cta.telemetry.retain_instance_id_on_restart {{ .Values.conf.telemetry.retainInstanceIdOnRestart }}
    cta.telemetry.metrics.backend {{ .Values.conf.telemetry.metrics.backend }}
    {{- if .Values.conf.telemetry.metrics.exportInterval }}
    cta.telemetry.metrics.export.interval {{ .Values.conf.telemetry.metrics.exportInterval }}
    {{- end }}
    {{- if .Values.conf.telemetry.metrics.exportTimeout }}
    cta.telemetry.metrics.export.timeout {{ .Values.conf.telemetry.metrics.exportTimeout }}
    {{- end }}
    {{- if .Values.conf.telemetry.metrics.otlp.endpoint }}
    cta.telemetry.metrics.otlp.endpoint {{ .Values.conf.telemetry.metrics.otlp.endpoint }}
    {{- end }}
    {{- if .Values.conf.telemetry.metrics.otlp.auth.basic.username }}
    cta.telemetry.metrics.otlp.auth.basic.username {{ $.Values.conf.telemetry.metrics.otlp.auth.basic.username }}
    {{- end }}
    {{- if .Values.conf.telemetry.metrics.otlp.auth.basic.passwordSecret }}
    cta.telemetry.metrics.otlp.auth.basic.password_file /etc/cta/otlp-basic-auth-pwd.conf
    {{- end }}
    {{- if .Values.conf.telemetry.metrics.file.endpoint }}
    cta.telemetry.metrics.file.endpoint {{ .Values.conf.telemetry.metrics.file.endpoint }}
    {{- end }}
