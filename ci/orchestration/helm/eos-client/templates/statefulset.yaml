{{- $podName := default .Chart.Name .Values.nameOverride -}}
{{- $name := printf "%s-%s" .Release.Name $podName | trunc 63 | trimSuffix "-" -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
    spec:
      {{- if .Values.pod.extraSpec }}
      {{ .Values.pod.extraSpec | toYaml | nindent 6 }}
      {{- end }}
      initContainers:
      - name: init1-get-krb5-keytabs
        image: gitlab-registry.cern.ch/dss/eos/eos-ci:5.3.36.el9 # TODO
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "-c"]
        args:
        - |
          sukadmin() { echo {{ .Values.global.kerberos.adminPrinc.password }} | kadmin -r {{ .Values.global.kerberos.defaultRealm | upper }} -p {{ .Values.global.kerberos.adminPrinc.name }}/admin $@; };
          {{ range $user := .Values.users }}
          sukadmin addprinc -randkey {{ $user }};
          sukadmin ktadd -k /root/{{ $user }}_keytab/output/{{ $user }}.keytab {{ $user }};
          {{ end }}
        volumeMounts:
        - name: krb5-conf
          mountPath: /etc/krb5.conf
          subPath: krb5.conf
        {{ range $user := .Values.users }}
        - name: "{{ $user }}-keytab"
          mountPath: "/root/{{ $user }}_keytab/output"
        {{ end }}
      containers:
      - name: client
        image: gitlab-registry.cern.ch/dss/eos/eos-ci:5.3.36.el9 # TODO
        imagePullPolicy: IfNotPresent
        stdin: true
        command: ["/bin/bash"]
        args: ["-c", "trap : TERM INT; sleep infinity & wait"]
        {{- if $.Values.resources }}
        resources:
          {{-  toYaml $.Values.resources | nindent 10 }}
        {{- end }}
        env:
        - name: MY_NAME
          value: {{ $name }}
        - name: MY_NAMESPACE
          value: {{ .Release.Namespace | quote }}
        - name: INSTANCE_NAME
          value: {{ .Release.Namespace | quote }}
        - name: TERM
          value: "xterm"
        - name: XrdSecPROTOCOL
          value: "krb5,unix"
        {{- with .Values.extraEnv }}
        {{- end }}
        volumeMounts:
        - name: krb5-conf
          mountPath: /etc/krb5.conf
          subPath: krb5.conf
        {{ range $user := .Values.users }}
        - name: "{{ $user }}-keytab"
          mountPath: "/root/{{ $user }}.keytab"
          subPath: "{{ $user }}.keytab"
        {{ end }}
      volumes:
      - name: krb5-conf
        configMap:
          name: {{ .Values.global.kerberos.clientConfig.configMap }}
      {{ range $user := .Values.users }}
      - name: "{{ $user }}-keytab"
        emptyDir: {}
      {{ end }}
