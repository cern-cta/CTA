frontend-admin:
  conf:
    auth:
      methods:
        - kerberos

cli:
  useGrpc: true
  conf:
    cta:
      endpoint: cta-frontend-admin:10956
      grpc:
        cta_admin_auth_method: krb5
        tls:
          chain_cert_path: /etc/grpc-certs/ca.crt.pem
          enabled: true

client:
  useGrpc: true
  conf:
    cta:
      endpoint: cta-frontend-admin:10956
      grpc:
        cta_admin_auth_method: krb5
        tls:
          chain_cert_path: /etc/grpc-certs/ca.crt.pem
          enabled: true
