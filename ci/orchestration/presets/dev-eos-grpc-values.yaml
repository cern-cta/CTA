global:
  # Note that the repository and tag are manually overriden by the create_instance script
  repository:
  tag:
  pullPolicy: IfNotPresent

  eos:
    instancename: ctaeos

  http:
    enabled: true

  sssKeytab:
    # This secret is generated by the authentication chart
    secret: eos-keytab

  extraObjects:
    # Ensure the MGM is addressable by its instancename
    - |
      apiVersion: v1
      kind: Service
      metadata:
        name: {{ include "mgm.instancename" . }}
      spec:
        type: ExternalName
        externalName: {{ include "utils.mgm_address" . }}

mgm:
  # Must match the authentication chart
  kerberos:
    enabled: true
    clientConfig:
      configMap: krb5-conf
    defaultRealm: TEST.CTA
    adminPrinc:
      name: root
      password: "defaultcipassword"

  # Ensure we can delete the pods quickly in CI
  pod:
    extraSpec:
      terminationGracePeriodSeconds: 1

  http:
    # Generated using: openssl rand -base64 64 | base64 -w 0
    macaroonsSecretKey: ZjZsMWxPT1lEc1poNFBKRTJiK05aaEhMdC9iUzdsSmxxNGZXT1Z4dE9PWElsR2I0MHhqZ3RnRDNzWnhVTW5iZAp1YWFSYmR6d0hSL3FMem1ncDNCWHFRPT0K

  xrd:
    # Additional tape-specific config
    # The option mgmofs.protowfusegrpc should be configurable
    # Allowing half the production (4k) size of the thread pool rather than the default 256.
    sched: "mint 16 maxt 2048 idle 128"
    extraConfig: |
      mgmofs.reportstorepath /var/log/eos/report
      xrootd.chksum  adler32
      mgmofs.archivedir /var/eos/archive
      mgmofs.prepare.dest.space default
      mgmofs.tapeenabled true
      mgmofs.protowfendpoint cta-frontend-wfe:10956
      mgmofs.protowfresource /ctafrontend
      mgmofs.protowfusegrpc true
      mgmofs.protowfusegrpctls true
      mgmofs.jwttokenpath /etc/cta/ctaeos.jwt
      mgmofs.protowfusegrpctlscert /etc/grid-security/certificates/ctaeos-self-signed.crt.pem
      mgmofs.protowfusegrpctlskey /etc/grid-security/certificates/ctaeos-self-signed.key.pem
      tpc.trace  all
      tpc.header2cgi  ArchiveMetadata archivemetadata
      taperestapi.sitename  cern-tape-archive-{{ include "mgm.instancename" . }}

  # Liveness probes are disabled for all pods as we specifically do not want the pod to restart in case of an error for CI
  # Additionally, these liveness probes cause a lot of extra messages in the logs
  probes:
    liveness: false

  extraEnv:
    # Remove once we are on EOS 5.4
    - name: EOS_USE_MQ_ON_QDB
      value: "1"
    - name: EOS_HA_REDIRECT_READS
      value: "1"
    - name: LD_PRELOAD
      value: "/usr/lib64/libjemalloc.so.2"
    # For some reason EOS is on another time zone, so set this to CET
    - name: TZ
      value: "CET"
  # Generate the self-signed certificates for http
  initContainer: &eos-init-container
    enabled: true
    script: |
      #!/usr/bin/bash
      /mkcert-ssl.sh
      chown -R daemon:daemon /etc/grid-security/certificates
      cp /etc/grpc-certs/ca.crt.pem /etc/grid-security/certificates
      cp /etc/grpc-certs-client/ctaeos-self-signed.crt.pem /etc/grid-security/certificates/
      cp /etc/grpc-certs-client/ctaeos-self-signed.key.pem /etc/grid-security/certificates/
      chmod 0600 /etc/grid-security/certificates/ctaeos-self-signed.key.pem
      chown daemon:daemon /etc/grid-security/certificates/ctaeos-self-signed.{key,crt}.pem

    volumeMounts:
      - name: grid-security
        mountPath: /etc/grid-security
      - name: grpc-certs
        mountPath: /etc/grpc-certs
      - name: ctaeos-self-signed-crt
        mountPath: /etc/grpc-certs-client/ctaeos-self-signed.crt.pem
        subPath: ctaeos-self-signed.crt.pem
      - name: ctaeos-self-signed-key
        mountPath: /etc/grpc-certs-client/ctaeos-self-signed.key.pem
        subPath: ctaeos-self-signed.key.pem

  extraVolumes: &eos-extra-volumes
    volumeMounts:
      # varlog-tmp is the location where core dumps will end up
      - name: varlog-tmp
        mountPath: /var/log/tmp
      - name: grid-security
        mountPath: /etc/grid-security
        readOnly: true
      - name: ctaeos-jwt
        mountPath: /etc/cta
        readOnly: true
    volumes:
      - name: varlog-tmp
        emptyDir: {}
      - name: grid-security
        emptyDir: {}
      - name: grpc-certs
        secret:
          secretName: ca-crt-pem
      - name: ctaeos-jwt
        secret:
          secretName: ctaeos-jwt
      - name: ctaeos-self-signed-crt
        secret:
          secretName: ctaeos-self-signed-crt-pem
      - name: ctaeos-self-signed-key
        secret:
          secretName: ctaeos-self-signed-key-pem

fst:
  replicaCount: 1

  pod:
    extraSpec:
      terminationGracePeriodSeconds: 1
      podManagementPolicy: Parallel

  xrd:
    # Increasing 2x the thread pool size w.r.t. the minimal default 256.
    sched: "mint 16 maxt 512 idle 64"
    extraConfig: |
      xrootd.redirect {{ include "utils.mgm_address" . }}:1094 chksum
      fstofs.protowfendpoint cta-frontend-wfe:10956
      fstofs.protowfresource /ctafrontend
      fstofs.filemd_handler  attr
      fstofs.protowfusegrpc true
      fstofs.protowfusegrpctls true
      fstofs.jwttokenpath /etc/cta/ctaeos.jwt
      fstofs.protowfusegrpctlscert /etc/grid-security/certificates/ctaeos-self-signed.crt.pem
      fstofs.protowfusegrpctlskey /etc/grid-security/certificates/ctaeos-self-signed.key.pem
      tpc.trace  all

  probes:
    liveness: false

  extraEnv:
    # Remove once we are on EOS 5.4
    - name: EOS_USE_MQ_ON_QDB
      value: "1"
    - name: TZ
      value: "CET"

  initContainer: *eos-init-container
  extraVolumes: *eos-extra-volumes

qdb:
  replicaCount: 1

  pod:
    extraSpec:
      terminationGracePeriodSeconds: 1

  extraEnv:
    - name: LD_PRELOAD
      value: "/usr/lib64/libjemalloc.so.2"
    - name: TZ
      value: "CET"

  probes:
    liveness: false
