global:
  securityContext:
    # We need privilege escalation for the tests and debugging
    allowPrivilegeEscalation: True
    privileged: False

frontend-wfe:
  port: 10956
  conf:
    # set by more specific config

frontend-admin:
  # Enabled to allow debugging after a crash
  port: 10956
  conf:
    # set by more specific config

cli:
  useGrpc: true
  conf:
    # set by more specific config

  extraEnv:
    - name: GRPC_SETUP_JWT
      value: "true"

  extraVolumes:
    volumeMounts:
      - name: grid-security
        mountPath: /etc/grid-security
        readOnly: false
      - name: grpc-certs
        mountPath: /etc/grpc-certs
        readOnly: true
    volumes:
      - name: grid-security
        emptyDir: {}
      - name: grpc-certs
        secret:
          secretName: ca-crt-pem

client:
  useGrpc: true
  conf:
    # set by more specific config

  extraEnv:
    - name: GRPC_SETUP_JWT
      value: "true"

  extraVolumes:
    volumeMounts:
      - name: grid-security
        mountPath: /etc/grid-security
        readOnly: false
      - name: grpc-certs
        mountPath: /etc/grpc-certs
        readOnly: true
    volumes:
      - name: grid-security
        emptyDir: {}
      - name: grpc-certs
        secret:
          secretName: ca-crt-pem
