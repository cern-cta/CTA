global:
  # Note that the repository and tag are manually overriden by the create_instance script
  repository:
  tag:
  pullPolicy: IfNotPresent

  eos:
    instancename: ctaeos

  http:
    enabled: true

  sssKeytab:
    # This secret is generated by the authentication chart
    secret: eos-keytab

  extraObjects:
    # Ensure the MGM is addressable by its instancename
    - |
      apiVersion: v1
      kind: Service
      metadata:
        name: {{ include "mgm.instancename" . }}
      spec:
        type: ExternalName
        externalName: {{ include "utils.mgm_address" . }}
    # Serve the local SciTokens discovery and JWKS files over HTTPS.
    - |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: scitokens-issuer-nginx
      data:
        default.conf: |
          server {
            listen 8443 ssl;
            server_name scitokens-issuer;

            ssl_certificate /tls/tls.crt;
            ssl_certificate_key /tls/tls.key;

            default_type application/json;

            location = /.well-known/openid-configuration {
              alias /srv/scitokens/scitokens-well-known;
            }

            location = /jwk {
              alias /srv/scitokens/scitokens.jwks;
            }
          }
    - |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: scitokens-issuer
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: scitokens-issuer
        template:
          metadata:
            labels:
              app: scitokens-issuer
          spec:
            containers:
              - name: nginx
                image: docker.io/nginxinc/nginx-unprivileged:stable-alpine
                ports:
                  - name: https
                    containerPort: 8443
                volumeMounts:
                  - name: nginx-conf
                    mountPath: /etc/nginx/conf.d/default.conf
                    subPath: default.conf
                  - name: scitokens-well-known
                    mountPath: /srv/scitokens/scitokens-well-known
                    subPath: scitokens-well-known
                  - name: scitokens-jwks
                    mountPath: /srv/scitokens/scitokens.jwks
                    subPath: scitokens.jwks
                  - name: tls
                    mountPath: /tls
                    readOnly: true
            volumes:
              - name: nginx-conf
                configMap:
                  name: scitokens-issuer-nginx
              - name: scitokens-well-known
                secret:
                  secretName: scitokens-well-known
              - name: scitokens-jwks
                secret:
                  secretName: scitokens-jwks
              - name: tls
                projected:
                  sources:
                    - secret:
                        name: scitokens-issuer-crt
                        items:
                          - key: scitokens-issuer.crt
                            path: tls.crt
                    - secret:
                        name: scitokens-issuer-key
                        items:
                          - key: scitokens-issuer.key
                            path: tls.key
    - |
      apiVersion: v1
      kind: Service
      metadata:
        name: scitokens-issuer
      spec:
        selector:
          app: scitokens-issuer
        ports:
          - name: https
            port: 8443
            targetPort: https


mgm:
  # Must match the authentication chart
  kerberos:
    enabled: true
    clientConfig:
      configMap: krb5-conf
    defaultRealm: TEST.CTA
    adminPrinc:
      name: root
      password: "defaultcipassword"

  # Ensure we can delete the pods quickly in CI
  pod:
    extraSpec:
      terminationGracePeriodSeconds: 1

  http:
    # Generated using: openssl rand -base64 64 | base64 -w 0
    macaroonsSecretKey: ZjZsMWxPT1lEc1poNFBKRTJiK05aaEhMdC9iUzdsSmxxNGZXT1Z4dE9PWElsR2I0MHhqZ3RnRDNzWnhVTW5iZAp1YWFSYmR6d0hSL3FMem1ncDNCWHFRPT0K
    sciTokens:
      enabled: true
      config: |
        [Issuer Local]
        issuer = https://scitokens-issuer:8443
        base_path = /
        map_subject = false
        default_user = poweruser1

  xrd:
    # Additional tape-specific config
    # Allowing half the production (4k) size of the thread pool rather than the default 256.
    sched: "mint 16 maxt 2048 idle 128"
    extraConfig: |
      xrootd.chksum  adler32
      mgmofs.archivedir /var/eos/archive
      mgmofs.prepare.dest.space default
      mgmofs.tapeenabled true
      mgmofs.protowfendpoint cta-frontend:10955
      mgmofs.protowfresource /ctafrontend
      mgmofs.protowfusegrpc false
      tpc.trace  all
      tpc.header2cgi  ArchiveMetadata archivemetadata
      taperestapi.sitename  cern-tape-archive-{{ include "mgm.instancename" . }}

  # Liveness probes are disabled for all pods as we specifically do not want the pod to restart in case of an error for CI
  # Additionally, these liveness probes cause a lot of extra messages in the logs
  probes:
    liveness: false

  extraEnv:
    # Remove once we are on EOS 5.4
    - name: EOS_USE_MQ_ON_QDB
      value: "1"
    - name: EOS_HA_REDIRECT_READS
      value: "1"
    - name: LD_PRELOAD
      value: "/usr/lib64/libjemalloc.so.2"
    # For some reason EOS is on another time zone, so set this to CET
    - name: TZ
      value: "CET"
    - name: SCITOKEN_CONFIG_TLS_CA_FILE
      value: "/etc/grid-security/certificates/ca.crt"

  # Generate the self-signed certificates for http
  initContainer:
    enabled: true
    script: |
      #!/usr/bin/bash
      /mkcert-ssl.sh
      cp /etc/scitokens-issuer-ca/ca.crt /etc/grid-security/certificates
      chown -R daemon:daemon /etc/grid-security/certificates
    volumeMounts:
      - name: grid-security
        mountPath: /etc/grid-security
      - name: scitokens-issuer-ca
        mountPath: /etc/scitokens-issuer-ca

  extraVolumes:
    volumeMounts:
      # varlog-tmp is the location where core dumps will end up
      - name: varlog-tmp
        mountPath: /var/log/tmp
      - name: grid-security
        mountPath: /etc/grid-security
        readOnly: true
      - name: scitokens-well-known
        mountPath: /etc/cta/scitokens-well-known
        subPath: scitokens-well-known
      - name: scitokens-jwks
        mountPath: /etc/cta/scitokens.jwks
        subPath: scitokens.jwks
    volumes:
      - name: varlog-tmp
        emptyDir: {}
      - name: grid-security
        emptyDir: {}
      - name: scitokens-well-known
        secret:
          secretName: scitokens-well-known
      - name: scitokens-jwks
        secret:
          secretName: scitokens-jwks
      - name: scitokens-issuer-ca
        secret:
          secretName: ca-crt

fst:
  replicaCount: 1
  podManagementPolicy: Parallel

  pod:
    extraSpec:
      terminationGracePeriodSeconds: 1

  xrd:
    # Increasing 2x the thread pool size w.r.t. the minimal default 256.
    sched: "mint 16 maxt 512 idle 64"
    extraConfig: |
      xrootd.redirect {{ include "utils.mgm_address" . }}:1094 chksum
      fstofs.protowfendpoint cta-frontend:10955
      fstofs.protowfresource /ctafrontend
      fstofs.protowfusegrpc false
      fstofs.filemd_handler  attr
      tpc.trace  all

  probes:
    liveness: false

  extraEnv:
    # Remove once we are on EOS 5.4
    - name: EOS_USE_MQ_ON_QDB
      value: "1"
    - name: TZ
      value: "CET"

  initContainer:
    enabled: true
    script: |
      #!/usr/bin/bash
      /mkcert-ssl.sh
      chown -R daemon:daemon /etc/grid-security/certificates
    volumeMounts:
      - name: grid-security
        mountPath: /etc/grid-security

  extraVolumes:
    volumeMounts:
      - name: varlog-tmp
        mountPath: /var/log/tmp
      - name: grid-security
        mountPath: /etc/grid-security
        readOnly: true
    volumes:
      - name: varlog-tmp
        emptyDir: {}
      - name: grid-security
        emptyDir: {}

qdb:
  replicaCount: 1

  pod:
    extraSpec:
      terminationGracePeriodSeconds: 1

  extraEnv:
    - name: LD_PRELOAD
      value: "/usr/lib64/libjemalloc.so.2"
    - name: TZ
      value: "CET"

  probes:
    liveness: false
